# fly.toml app configuration file generated for waypoint-qmh6xa on 2026-07-07T15:26:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'waypoint-qmh6xa'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  AUTH_MODE = 'mock'
  NODE_ENV = 'production'
  PORT = '4000'
  REPORTING_TIMEZONE = 'America/Chicago'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      SVG favicon; every modern browser renders it (and it scales cleanly
      to any pinned-tab / bookmark size). The `?v=` query is a cache
      buster — browsers hold on to favicons (and even "no favicon"
      results) far more aggressively than any other asset, so bump the
      version whenever the icon changes to force a refetch for every
      returning user.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1" />
    <link rel="apple-touch-icon" href="/favicon.svg?v=1" />
    <meta name="theme-color" content="#E01F2D" />
    <title>Waypoint — Product Backlog & Roadmap</title>
  </head>
  <body class="bg-wp-bg text-wp-ink">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

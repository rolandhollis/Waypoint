services:
  postgres:
    image: postgres:16-alpine
    container_name: waypoint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: waypoint
      POSTGRES_PASSWORD: waypoint
      POSTGRES_DB: waypoint
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waypoint -d waypoint"]
      interval: 5s
      timeout: 5s
      retries: 10
